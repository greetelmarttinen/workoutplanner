<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercises</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}">

</head>

<body>
    <div class="container">
        <h1>Your Workout Planner</h1>
        <br>
        <!--etusivulle-->
        <a class="btn btn-secondary" href="/index">Back</a>
        <br>
        <br>
        <h3>Exercises</h3>


        <div sec:authorize="hasAuthority('ADMIN')">
            <form method="post" action="#" th:action="@{/saveexercise}" th:object="${exercise}">
                <div class="row g-3">
                    <div>
                        <input type="hidden" th:field="${exercise.exerciseId}">
                    </div>
                    <div class="col-sm-5">
                        <input type="text" class="form-control" th:field="${exercise.name}" placeholder="Exercise">
                    </div>
                    <div class="col-sm-5">
                        <input type="text" class="form-control" th:field="${exercise.muscleGroup}"
                            placeholder="Muscle group">
                    </div>
                    <div class="col text-end">
                        <button type="submit" class="btn btn-success">Add exercise</button>
                    </div>
                </div>
            </form>
        </div>



        <br>

        <!--listaus tietokantaan tallennetuista liikkeistä-->
        <table class="table table-striped">
            <tr>
                <th>Exercise name</th>
                <th>Muscle group</th>
                <th type="hidden"></th>
            </tr>
            <tr th:each="exercise : ${exercises}">
                <td th:text="${exercise.name}"></td>
                <td th:text="${exercise.muscleGroup}"></td>
                <td type="hidden" sec:authorize="hasAuthority ('USER')"></td>
                <td sec:authorize="hasAuthority ('ADMIN')" class="text-end">
                    <a class="btn btn-outline-secondary"
                        th:href="@{/editExercise/{id}(id=${exercise.exerciseId})}">Edit</a>
                    <a class="btn btn-outline-danger"
                        th:href="@{/deleteExercise/{id}(id=${exercise.exerciseId})}">Delete</a>
                </td>

            </tr>
        </table>
    </div>

</body>

</html>
