<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Workout</title>
</head>

<body>
    <h1>Your Workout Planner</h1>
    <br>
    <h2>Create new program</h2>
    <div class="container">
        <div>
            <form method="post" action="#" th:action="@{/saveprogram}" th:object="${workoutProgram}">
                <div class="row g-2">
                    <div class="col">
                        <input type="text" th:field="${workoutProgram.name}" placeholder="Name your workout program">
                    </div>

                    <div class="col">
                        <input type="text" th:field="${workoutProgram.date}" placeholder="Date">
                    </div>

                    <div class="col">
                        <button type="submit">Create workout</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
